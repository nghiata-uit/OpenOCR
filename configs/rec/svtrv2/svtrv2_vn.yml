Global:
  device: gpu
  epoch_num: 100
  log_smooth_window: 20
  print_batch_step: 10
  output_dir: ./output/rec/vn/svtrv2_vn/
  save_epoch_step: [1, 10]  # SỬA LỖI: Lưu mô hình checkpoint mỗi 10 epoch
  eval_epoch_step: [0, 1]
  eval_batch_step: [0, 2000]
  cal_metric_during_train: True
  pretrained_model: ./svtrv2_smtr_gtc_rctc/best.pth # Chắc chắn bạn đã tải đúng trọng số mobile này
  checkpoints:
  use_tensorboard: false
  infer_img:
  character_dict_path: &character_dict_path ./tools/utils/vn_dict.txt
  max_text_length: &max_text_length 42
  use_space_char: &use_space_char True
  save_res_path: ./output/rec/vn/svtrv2_vn/predicts_svtrv2_vn.txt # SỬA LỖI: Đổi đường dẫn lưu dự đoán
  use_amp: True
  project_name: svtrv2_vn_finetune # Đổi tên Project cho chuyên nghiệp

Optimizer:
  name: Adam
  lr: 0.0001
  weight_decay: 3.0e-05
  filter_bias_and_bn: False

LRScheduler:
  name: CosineAnnealingLR
  warmup_epoch: 5

Architecture:
  model_type: rec
  algorithm: SVTRv2
  Transform:
  Encoder:
    name: RepSVTREncoder
  Decoder:
    name: CTCDecoder
    svtr_encoder:
      dims: 256
      depth: 2
      hidden_dims: 256
      kernel_size: [1, 3]
      use_guide: True

Loss:
  name: CTCLoss
  zero_infinity: True

PostProcess:
  name: CTCLabelDecode
  character_dict_path: *character_dict_path

Metric:
  name: RecMetric
  main_indicator: acc
  ignore_space: False

Train:
  dataset:
    name: SimpleDataSet
    data_dir: ./vintext_svtrv2/
    label_file_list:
      - ./vintext_svtrv2/rec_gt_train.txt
    transforms:
      - DecodeImagePIL:
          img_mode: RGB
      - PARSeqAugPIL:
      - CTCLabelEncode:
          character_dict_path: *character_dict_path
          use_space_char: *use_space_char
          max_text_length: *max_text_length
      - RecTVResize:
          image_shape: [48, 320]
          padding: True
      - KeepKeys:
          keep_keys: ['image', 'label', 'length']
  loader:
    shuffle: True
    batch_size_per_card: 256
    drop_last: True
    num_workers: 4

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: ./vintext_svtrv2/
    label_file_list:
      - ./vintext_svtrv2/rec_gt_test.txt  # SỬA LỖI: Trỏ vào tập Test để tránh Data Leakage
    transforms:
      - DecodeImagePIL:  # SỬA LỖI: Đổi thành DecodeImagePIL để đồng bộ không gian RGB
          img_mode: RGB
      - CTCLabelEncode:
          character_dict_path: *character_dict_path
          use_space_char: *use_space_char
          max_text_length: *max_text_length
      - RecDynamicResize:
          image_shape: [48, 320]
          padding: False
      - KeepKeys:
          keep_keys: ['image', 'label', 'length']
  loader:
    shuffle: False
    drop_last: False
    batch_size_per_card: 64 # TỐI ƯU: Tăng lên 64 giúp tiến trình đánh giá chạy lướt nhanh hơn
    num_workers: 4